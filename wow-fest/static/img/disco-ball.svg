<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="silverSphere" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#f4f6f8"/>
      <stop offset="45%" stop-color="#cdd3da"/>
      <stop offset="70%" stop-color="#9aa1ab"/>
      <stop offset="100%" stop-color="#5b6066"/>
    </radialGradient>
    <radialGradient id="silverGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hangCord" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#8a8a8a"/>
    </linearGradient>
    <clipPath id="ballClip2">
      <circle cx="120" cy="128" r="96"/>
    </clipPath>
  </defs>

  <circle cx="120" cy="128" r="124" fill="url(#silverGlow)"/>
  <line x1="120" y1="0" x2="120" y2="22" stroke="url(#hangCord)" stroke-width="3"/>
  <circle cx="120" cy="128" r="96" fill="url(#silverSphere)"/>

  <!-- mosaic tile grid -->
  <g clip-path="url(#ballClip2)">
    <g stroke="#3a3f47" stroke-width="1.1" opacity="0.6">
      <path d="M120 32 V224" fill="none"/>
      <path d="M90 35 Q70 128 90 221" fill="none"/>
      <path d="M150 35 Q170 128 150 221" fill="none"/>
      <path d="M62 48 Q40 128 62 208" fill="none"/>
      <path d="M178 48 Q200 128 178 208" fill="none"/>
      <path d="M38 78 Q26 128 38 178" fill="none"/>
      <path d="M202 78 Q214 128 202 178" fill="none"/>
      <path d="M26 100 Q120 78 214 100" fill="none"/>
      <path d="M26 128 H214" fill="none"/>
      <path d="M26 156 Q120 178 214 156" fill="none"/>
      <path d="M40 178 Q120 200 200 178" fill="none"/>
      <path d="M40 78 Q120 56 200 78" fill="none"/>
      <path d="M58 200 Q120 216 182 200" fill="none"/>
      <path d="M58 56 Q120 40 182 56" fill="none"/>
    </g>

    <!-- bright mirror-tile squares scattered across facets, larger + crisper for a metallic look -->
    <g fill="#ffffff">
      <rect x="74" y="54" width="7" height="7" opacity="1" transform="rotate(18 77 57)"/>
      <rect x="103" y="48" width="5" height="5" opacity="0.8" transform="rotate(-10 105 50)"/>
      <rect x="146" y="62" width="7" height="7" opacity="0.95" transform="rotate(25 149 65)"/>
      <rect x="170" y="96" width="5" height="5" opacity="0.75" transform="rotate(-20 172 98)"/>
      <rect x="158" y="148" width="6" height="6" opacity="0.85" transform="rotate(12 161 151)"/>
      <rect x="119" y="184" width="5" height="5" opacity="0.7" transform="rotate(8 121 186)"/>
      <rect x="78" y="168" width="6" height="6" opacity="0.8" transform="rotate(-15 80 170)"/>
      <rect x="50" y="130" width="5" height="5" opacity="0.65" transform="rotate(20 52 132)"/>
      <rect x="60" y="98" width="5" height="5" opacity="0.7" transform="rotate(-8 62 100)"/>
      <rect x="129" y="108" width="5" height="5" opacity="0.8"/>
      <rect x="98" y="128" width="5" height="5" opacity="0.65"/>
      <rect x="140" y="135" width="4" height="4" opacity="0.6"/>
      <rect x="85" y="115" width="4" height="4" opacity="0.55"/>
      <rect x="110" y="160" width="5" height="5" opacity="0.6" transform="rotate(10 112 162)"/>
      <rect x="155" y="115" width="4" height="4" opacity="0.6"/>
    </g>
  </g>

  <!-- strong specular highlight for a glassy, metallic sheen -->
  <ellipse cx="88" cy="84" rx="34" ry="22" fill="#ffffff" opacity="0.45"/>
  <ellipse cx="78" cy="76" rx="14" ry="9" fill="#ffffff" opacity="0.6"/>
</svg>
